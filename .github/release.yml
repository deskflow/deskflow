changelog:
  categories:
    - title: Features
      labels:
        - "🪄 feature request"
        - "✨ enhancement"
    - title: Fixes
      labels:
        - "🩹 fix"
    - title: Refactor
      labels:
        - "refactor:"
        - "refactor(*):"
        - "refactor (*):"
    - title: Build
      labels:
        - "🚧 build"
    - title: Documentation
      labels:
        - "📝 document"
    - title: Translations
      labels:
        - ":speech_balloon: I18N"
    - title: CI Updates
      labels:
        - ":robot: ci"
    - title: Package
      labels:
        - "package:*"
        - "package(*):*"
        - "package (*):*"
    - title: Chores
      labels:
        - "chore:"
        - "chore(*):"
        - "chore (*):"
    - title: Commits
      labels:
        - "*"


